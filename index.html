<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristocrat Apex-Pro v4.0</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes reel-blur-spin {
            0% { transform: translateY(-10%); filter: blur(0px); }
            50% { transform: translateY(10%); filter: blur(8px); }
            100% { transform: translateY(-10%); filter: blur(0px); }
        }
        .spinning { animation: reel-blur-spin 0.15s linear infinite; }
        
        @keyframes win-glow {
            0%, 100% { box-shadow: 0 0 20px #fbbf24; border-color: #fbbf24; }
            50% { box-shadow: 0 0 50px #f59e0b; border-color: #f59e0b; }
        }
        .win-border { animation: win-glow 0.5s ease-in-out infinite; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SYMBOLS = [
            { char: '🍒', name: 'Cherry', mult: 5, color: 'text-green-400' },
            { char: '🍋', name: 'Lemon', mult: 10, color: 'text-purple-400' },
            { char: '🔔', name: 'Bell', mult: 25, color: 'text-cyan-400' },
            { char: '7️⃣', name: 'Seven', mult: 80, color: 'text-red-500' },
            { char: '💎', name: 'Jackpot', mult: 250, color: 'text-yellow-400' }
        ];

        function SlotMachine() {
            const [credits, setCredits] = useState(0);
            const [reels, setReels] = useState([SYMBOLS[0], SYMBOLS[1], SYMBOLS[2]]);
            const [isSpinning, setIsSpinning] = useState(false);
            const [lastWin, setLastWin] = useState(0);
            const [totalSessionWins, setTotalSessionWins] = useState(0);
            const [showWarning, setShowWarning] = useState(true);
            const [isWinner, setIsWinner] = useState(false);
            const [isCashedOut, setIsCashedOut] = useState(false);

            const startGame = (val) => {
                setCredits(Number(val) || 100);
                setShowWarning(false);
            };

            const handleCashOut = () => {
                if (totalSessionWins > 0) {
                    setIsCashedOut(true);
                } else {
                    if (confirm("You haven't won anything yet. If you exit now, all remaining credits will be forfeited. Continue?")) {
                        window.location.reload();
                    }
                }
            };

            const spin = () => {
                if (credits < 10 || isSpinning) return;

                setIsSpinning(true);
                setIsWinner(false);
                setCredits(prev => prev - 10);
                setLastWin(0);

                const interval = setInterval(() => {
                    setReels([
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]
                    ]);
                }, 100);

                setTimeout(() => {
                    clearInterval(interval);
                    const final = [
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)],
                        SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]
                    ];
                    setReels(final);
                    setIsSpinning(false);

                    if (final[0].name === final[1].name && final[1].name === final[2].name) {
                        const win = 10 * final[0].mult;
                        setLastWin(win);
                        setCredits(prev => prev + win);
                        setTotalSessionWins(prev => prev + win);
                        setIsWinner(true);
                    }
                }, 2000);
            };

            if (isCashedOut) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-neutral-950 p-6">
                        <div className="bg-white text-black p-10 rounded-lg max-w-sm w-full font-mono shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                            <h2 className="text-center font-bold text-2xl border-b-2 border-black pb-4 mb-4">CASHOUT VOUCHER</h2>
                            <div className="space-y-2 text-lg">
                                <div className="flex justify-between"><span>SESSION WINS:</span> <span>${totalSessionWins}</span></div>
                                <div className="flex justify-between font-black text-2xl border-t border-black pt-4"><span>TOTAL PAYOUT:</span> <span>${credits}</span></div>
                            </div>
                            <div className="mt-8 text-center text-xs text-gray-500 italic">"Thank you for playing Aristocrat Apex-Pro"</div>
                            <button onClick={() => window.location.reload()} className="mt-8 w-full bg-black text-white py-4 rounded hover:bg-gray-800 transition">NEW SESSION</button>
                        </div>
                    </div>
                );
            }

            if (showWarning) {
                return (
                    <div className="flex items-center justify-center min-h-screen bg-gray-900 px-4">
                        <div className="bg-black border-4 border-red-600 p-10 rounded-2xl max-w-md text-center">
                            <h1 className="text-4xl font-black text-red-600 mb-6 uppercase">Legal Notice</h1>
                            <p className="text-gray-400 mb-8 italic leading-relaxed">"Wagers are final. Credits are only redeemable if a winning combination is achieved during the session."</p>
                            <input type="number" placeholder="Enter Credits" className="w-full bg-gray-900 border-2 border-gray-700 p-4 rounded-lg mb-6 text-xl text-center text-white outline-none" id="credInput"/>
                            <button onClick={() => startGame(document.getElementById('credInput').value)} className="w-full bg-red-600 hover:bg-red-700 text-white text-xl font-bold py-4 rounded-lg transition active:scale-95 shadow-lg">INITIALIZE WAGER</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-neutral-950 flex items-center justify-center p-4">
                    <div className={`relative w-full max-w-md bg-zinc-900 border-8 border-zinc-800 rounded-[3rem] shadow-2xl transition-all duration-500 ${isWinner ? 'scale-105' : ''}`}>
                        
                        {isWinner && (
                            <div className="absolute inset-0 pointer-events-none z-50 flex items-center justify-center">
                                <div className="bg-yellow-500/20 w-full h-full animate-pulse rounded-[2.5rem] flex items-center justify-center">
                                    <h2 className="text-6xl font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(251,191,36,1)] rotate-[-10deg] uppercase italic">BIG WIN!</h2>
                                </div>
                            </div>
                        )}

                        <div className="bg-zinc-800 p-6 text-center rounded-t-[2.2rem]">
                            <h2 className="text-2xl font-black text-yellow-500 tracking-widest italic uppercase">Apex-Pro v4.0</h2>
                            <p className="text-[10px] text-zinc-500 font-bold tracking-[0.3em]">ARISTOCRAT TECHNOLOGIES</p>
                        </div>

                        <div className="grid grid-cols-2 bg-black border-y-2 border-zinc-800 p-6">
                            <div className="border-r border-zinc-800 text-center">
                                <span className="text-xs text-zinc-500 uppercase font-bold">Credits</span>
                                <div className="text-4xl font-mono text-green-500">${credits}</div>
                            </div>
                            <div className="text-center">
                                <span className="text-xs text-zinc-500 uppercase font-bold">Session Wins</span>
                                <div className="text-4xl font-mono text-yellow-400">${totalSessionWins}</div>
                            </div>
                        </div>

                        <div className="bg-black px-4 py-12 flex justify-center gap-2">
                            {reels.map((s, i) => (
                                <div key={i} className={`w-28 h-40 bg-zinc-800 rounded-xl flex items-center justify-center text-6xl shadow-inner border-2 ${isSpinning ? 'spinning' : 'border-zinc-700'} ${isWinner ? 'win-border' : ''}`}>{s.char}</div>
                            ))}
                        </div>

                        <div className="p-10 space-y-6 bg-zinc-900 rounded-b-[2.2rem]">
                            <button 
                                onClick={spin}
                                disabled={isSpinning || credits < 10}
                                className={`w-full py-8 rounded-2xl text-3xl font-black shadow-[0_8px_0_rgb(180,83,9)] active:translate-y-1 active:shadow-none transition-all ${isSpinning ? 'bg-zinc-700 shadow-none text-zinc-500' : 'bg-gradient-to-b from-yellow-400 to-yellow-600 text-black'}`}
                            >
                                {isSpinning ? 'SPINNING' : 'PLAY ($10)'}
                            </button>

                            <button onClick={handleCashOut} className="w-full text-zinc-600 hover:text-green-500 text-sm font-bold uppercase tracking-widest transition">
                                [ Cash Out Session ]
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SlotMachine />);
    </script>
</body>
</html>
